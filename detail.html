<!DOCTYPE html>
<html lang="id" class="scroll-smooth overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detail Momen - KSPK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090E17;
            --accent-silver: #94A3B8;
            --text-light: #F8FAFC;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
        }

        /* Ambient Glow Backgrounds */
        .bg-glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .glow-orb-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(148, 163, 184, 0.08) 0%, transparent 70%);
        }

        /* Premium Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative">

    <div class="bg-glow-container">
        <div class="glow-orb-1"></div>
    </div>

    <nav class="fixed top-0 w-full z-40 p-4 sm:p-6 lg:p-8 flex justify-start left-0 right-0 max-w-7xl mx-auto pointer-events-none">
        <a href="index.html#galeri" id="btn-kembali" class="pointer-events-auto inline-flex items-center gap-2 glass px-5 py-2.5 rounded-full text-xs font-bold uppercase tracking-widest text-gray-300 hover:text-white hover:bg-white/10 transition-all duration-300 active:scale-95 shadow-lg">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Kembali
        </a>
    </nav>

    <main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4 sm:px-6 z-10 w-full max-w-6xl mx-auto min-h-screen">
        <div class="glass w-full rounded-[2rem] md:rounded-[2.5rem] overflow-hidden flex flex-col md:flex-row shadow-2xl" data-aos="zoom-in-up">
            
            <div class="w-full md:w-[55%] relative flex-shrink-0 flex items-center justify-center p-6 sm:p-8 md:p-10 border-b md:border-b-0 md:border-r border-white/10 bg-[#060A11]/60">
                <img id="detail-image" src="" alt="Detail Foto" class="w-full h-full object-contain max-h-[50vh] md:max-h-[65vh] lg:max-h-[70vh] rounded-xl drop-shadow-2xl transition-all duration-500">
            </div>

            <div class="w-full md:w-[45%] p-8 sm:p-10 md:p-12 lg:p-16 flex flex-col justify-center relative bg-gradient-to-br from-transparent to-black/20">
                <div data-aos="fade-left" data-aos-delay="200">
                    <span id="detail-category" class="inline-block px-4 py-1.5 bg-white/10 backdrop-blur-md rounded-full text-[10px] sm:text-xs text-white mb-5 w-max border border-white/20 uppercase tracking-[0.2em] font-semibold shadow-sm"></span>
                    
                    <h1 id="detail-title" class="text-3xl sm:text-4xl lg:text-5xl font-bold text-white mb-5 leading-tight tracking-tight"></h1>
                    
                    <div class="w-16 h-1 bg-gradient-to-r from-gray-400 to-transparent rounded-full mb-8"></div>
                    
                    <p id="detail-desc" class="text-gray-300 text-sm sm:text-base lg:text-lg font-light leading-relaxed mb-10 md:mb-14"></p>
                </div>
                
                <div class="flex items-center gap-4 mt-auto pt-6 border-t border-white/10" data-aos="fade-up" data-aos-delay="300">
                    <img src="images/logo3.png" alt="Logo KSPK" class="w-10 h-10 lg:w-12 lg:h-12 rounded-full opacity-90 object-cover border border-white/20">
                    <div>
                        <p class="text-[10px] lg:text-xs text-gray-400 uppercase tracking-[0.2em] font-semibold mb-0.5">Arsip KSPK</p>
                        <p id="detail-date" class="text-xs lg:text-sm text-gray-200 font-medium"></p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Inisialisasi Animasi
        AOS.init({ duration: 800, easing: 'ease-out-cubic', once: true });

        // Database dinamis sederhana (JSON Object)
        const photoData = {
            "foto1": { imgSrc: "images/galery/foto1.png", category: "Memory Lane", title: "Kumpul Santai", desc: "Foto diambil pada tanggal 18 Agustus 2023, foto tersebut diambil sebagai kenang-kenangan sebelum lulus. Momen yang sederhana tapi sangat bermakna bagi semuanya.", date: "18 Agustus 2023" },
            "foto2": { imgSrc: "images/galery/foto2.png", category: "Pure Joy", title: "Sesi Tawa Abis", desc: "Jam kosong, candaan nggak ada habisnya. Momen tawa lepas yang bikin perut sakit tapi hati senang. Saat-saat di mana beban tugas sekolah hilang seketika.", date: "Memori Kelas" },
            "foto3": { imgSrc: "images/galery/foto3.png", category: "Formasi Lengkap", title: "Hari Penting", desc: "Momen langka di mana semuanya on-time, seragam lengkap, dan siap untuk foto kelas yang formal tapi tetap asik. Formasi solid KSPK.", date: "Buku Tahunan" },
            "foto4": { imgSrc: "images/galery/foto4.jpg", category: "White Uniform", title: "Sinergi Putih Abu", desc: "Formasi andalan kalau matahari lagi terik-teriknya. Panas bukan halangan buat tetap eksis bareng.", date: "Buku Tahunan" },
            "foto5": { imgSrc: "images/galery/foto5.jpg", category: "Solid Squad", title: "Double Peace", desc: "Satu komando, semua angkat jari. Ekspresi lepas tanpa beban pikiran tugas esok hari.", date: "Buku Tahunan" },
            "foto6": { imgSrc: "images/galery/foto6.jpg", category: "Fun Times", title: "Teropong Masa Depan", desc: "Pose absurd yang mulai keluar saat kamera depan handphone sudah jepret lebih dari tiga kali.", date: "Buku Tahunan" },
            "foto7": { imgSrc: "images/galery/foto7.jpg", category: "Batik Day", title: "Geng Lesehan", desc: "Rebahan santai di rumput lapangan terbuka setelah penat atau emang dasarnya mager berjamaah.", date: "Buku Tahunan" },
            "foto8": { imgSrc: "images/galery/foto8.jpg", category: "Casual Blue", title: "Senyum Simetris", desc: "Mencari sudut kamera terbaik demi mengamankan estetika feed bersama anak-anak angkatan.", date: "Buku Tahunan" },
            "foto9": { imgSrc: "images/galery/foto9.jpg", category: "Outdoors", title: "Salam Rock n Roll", desc: "Penutupan sesi foto dengan energi penuh dan gaya bebas andalan sebelum kembali ke jam pelajaran.", date: "Buku Tahunan" }
        };

        // Ambil ID dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const photoId = urlParams.get('id');

        // Render Data ke HTML
        if (photoId && photoData[photoId]) {
            const data = photoData[photoId];
            document.getElementById('detail-image').src = data.imgSrc;
            document.getElementById('detail-category').innerText = data.category;
            document.getElementById('detail-title').innerText = data.title;
            document.getElementById('detail-desc').innerText = data.desc;
            document.getElementById('detail-date').innerText = data.date;
        } else {
            document.getElementById('detail-title').innerText = "Momen Tidak Ditemukan";
            document.getElementById('detail-desc').innerText = "Maaf, foto yang kamu cari sepertinya tidak ada di arsip kami.";
            document.getElementById('detail-category').style.display = "none";
        }

        // FUNGSI KHUSUS UNTUK TOMBOL KEMBALI DI MOBILE
        document.getElementById('btn-kembali').addEventListener('click', function(e) {
            if (window.innerWidth < 640) {
                e.preventDefault(); 
                window.close();     
            }
        });
    </script>
</body>
</html>
